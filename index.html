<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌶️ Pili Pili - Le Vrai Jeu de Plis</title>
    <style>
        :root {
            --bg-border: #f4f1ea;
            --primary: #d90429;
            --secondary: #2b2d42;
            --accent: #ffb703;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-border);
            color: var(--secondary);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }
        h1 { color: var(--primary); text-align: center; margin-top: 0; }
        
        /* Écrans */
        .hidden { display: none !important; }
        
        /* Zone Règle de la Manche */
        .rule-box {
            background-color: #ffe3e3;
            border-left: 5px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Status & Scores */
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #edf2f4;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        /* Tapis de Jeu Central */
        .table-center {
            background: #e2eafc;
            border-radius: 12px;
            padding: 20px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            border: 2px dashed #b6ccfe;
        }

        /* Composant Carte */
        .card {
            width: 70px;
            height: 105px;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            border: 2px solid var(--secondary);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            cursor: pointer;
            user-select: none;
            transition: transform 0.15s;
        }
        .card:hover { transform: translateY(-8px); }
        .card.played { cursor: default; transform: none; }
        .card-owner {
            position: absolute;
            bottom: 5px;
            font-size: 10px;
            color: #666;
            font-weight: normal;
        }

        /* Main du joueur */
        .hand-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 15px 5px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        /* Inputs et boutons */
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }

        .btn-bet { width: auto; padding: 10px 20px; background: var(--accent); color: var(--secondary); }
        .bet-input-group { display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌶️ Pili Pili Web</h1>

    <!-- ÉCRAN 1 : CONNEXION -->
    <div id="screen-login">
        <input type="text" id="username" placeholder="Ton prénom (ex: Chouchou)">
        <select id="role-select">
            <option value="p1">Joueur 1 (Créer/Gérer la table)</option>
            <option value="p2">Joueur 2 (Rejoindre)</option>
        </select>
        <button id="btn-start">Rejoindre la Table</button>
    </div>

    <!-- ÉCRAN 2 : JEU -->
    <div id="screen-game" class="hidden">
        
        <!-- Score global & Piments reçus -->
        <div class="status-bar">
            <div id="score-p1">Joueur 1: 0 🌶️ (Pari: - | Plis: 0)</div>
            <div id="score-p2">Joueur 2: 0 🌶️ (Pari: - | Plis: 0)</div>
        </div>

        <!-- Règle de la manche piochée -->
        <div class="rule-box">
            📜 <span id="current-rule">En attente du début de la manche...</span>
        </div>

        <div id="game-status-text" style="text-align: center; font-weight: bold; margin-bottom: 10px; color: var(--primary);"></div>

        <!-- Phase de Pari (Guess) -->
        <div id="bet-zone" class="hidden">
            <div class="bet-input-group">
                <label>Combien de manches vas-tu gagner ?</label>
                <input type="number" id="bet-value" min="0" max="5" value="0" style="width: 70px;">
                <button id="btn-submit-bet" class="btn-bet">Valider mon Pari</button>
            </div>
        </div>

        <!-- Le Tapis (Cartes jouées au centre pour le pli en cours) -->
        <h3 style="margin-bottom:5px;">Le Tapis Central</h3>
        <div class="table-center" id="table-center">
            <!-- Emplacement des cartes jouées -->
            <div style="color: #999; font-style: italic;">Aucune carte sur le tapis</div>
        </div>

        <!-- La main du joueur -->
        <h3 style="margin-bottom:5px;">Tes cartes en main :</h3>
        <div class="hand-container" id="player-hand">
            <!-- Rempli en JS -->
        </div>
        
        <button id="btn-next-round" class="hidden" style="margin-top:20px; background-color: var(--secondary);">Lancer la Manche Suivante</button>
    </div>
</div>

<script>
    // --- MOTEUR DE JEU PILI PILI ---
    
    // Liste de règles inspirées du jeu
    const RULES = [
        { id: 1, text: "Classique : La plus forte carte (la plus proche de 55) gagne la manche." },
        { id: 2, text: "Inversion : La plus PETITE carte gagne la manche !" },
        { id: 3, text: "Zéro Absolu : Si une carte est un chiffre PAIR, elle bat n'importe quel chiffre IMPAIR." },
        { id: 4, text: "Piment Magique : Les chiffres se terminant par un 5 (15, 25, 35...) l'emportent toujours." },
        { id: 5, text: "Proche du milieu : C'est la carte la plus proche du chiffre 28 qui gagne le pli." }
    ];

    // État du jeu central partagé
    let state = {
        rule: null,
        scores: { p1: 0, p2: 0 },        // Nombre de piments accumulés (malus)
        bets: { p1: null, p2: null },    // Les pronostics faits
        tricksWon: { p1: 0, p2: 0 },  // Nombre de plis gagnés dans la manche en cours
        center: {},                      // { p1: cardValue, p2: cardValue }
        phase: "betting",                // "betting" ou "playing" ou "round_ended"
        turn: "p1"                       // À qui le tour de poser sa carte
    };

    let myRole = ""; // "p1" ou "p2"
    let myHand = [];
    let cardsPerRound = 5; // Nombre de cartes distribuées pour la manche

    // Références DOM
    const elLogin = document.getElementById('screen-login');
    const elGame = document.getElementById('screen-game');
    const elRule = document.getElementById('current-rule');
    const elHand = document.getElementById('player-hand');
    const elTable = document.getElementById('table-center');
    const elBetZone = document.getElementById('bet-zone');
    const elStatusText = document.getElementById('game-status-text');
    const elBtnNext = document.getElementById('btn-next-round');

    // Connexion / Initialisation
    document.getElementById('btn-start').addEventListener('click', () => {
        const name = document.getElementById('username').value.trim();
        myRole = document.getElementById('role-select').value;
        if(!name) return alert("Indique ton prénom !");
        
        elLogin.classList.add('hidden');
        elGame.classList.remove('hidden');
        
        if(myRole === 'p1') {
            startNewRound();
        } else {
            // Dans une vraie appli en ligne, on attendrait le signal de P1. 
            // Pour jouer immédiatement sur la même machine (simulation), on synchronise.
            simulateP2Joining();
        }
    });

    // Générer un deck complet 1 à 55 mélangé
    function generateDeck() {
        let deck = [];
        for(let i = 1; i <= 55; i++) deck.push(i);
        return deck.sort(() => Math.random() - 0.5);
    }

    // Lancement d'une manche complète
    function startNewRound() {
        let deck = generateDeck();
        
        // Distribution (on simule le stockage pour les deux joueurs)
        // Dans une architecture réseau réelle (Firebase/Supabase), P1 enverrait ces infos dans la base de données.
        window.p1Cards = deck.slice(0, cardsPerRound).sort((a,b)=>a-b);
        window.p2Cards = deck.slice(cardsPerRound, cardsPerRound * 2).sort((a,b)=>a-b);
        
        state.rule = RULES[Math.floor(Math.random() * RULES.length)];
        state.bets = { p1: null, p2: null };
        state.tricksWon = { p1: 0, p2: 0 };
        state.center = {};
        state.phase = "betting";
        state.turn = "p1";

        updateLocalStorageState(); // Synchro locale simulée
        loadPlayerView();
    }

    // Permet de rafraîchir l'interface selon le rôle et l'état du jeu
    function loadPlayerView() {
        // Récupérer la main selon le rôle
        myHand = (myRole === 'p1') ? window.p1Cards : window.p2Cards;
        
        // Mettre à jour les scores textuels
        document.getElementById('score-p1').innerText = `Joueur 1: ${state.scores.p1} 🌶️ (Pari: ${state.bets.p1 !== null ? state.bets.p1 : '-'} | Plis: ${state.tricksWon.p1})`;
        document.getElementById('score-p2').innerText = `Joueur 2: ${state.scores.p2} 🌶️ (Pari: ${state.bets.p2 !== null ? state.bets.p2 : '-'} | Plis: ${state.tricksWon.p2})`;
        
        // Règle actuelle
        elRule.innerText = state.rule ? state.rule.text : "En attente...";

        // Gestion de l'affichage de la zone des paris
        if(state.phase === "betting") {
            elStatusText.innerText = "Analysez vos cartes et faites votre prono (Guess) !";
            if(state.bets[myRole] === null) {
                elBetZone.classList.remove('hidden');
            } else {
                elBetZone.classList.add('hidden');
                elStatusText.innerText = "Tu as parié ! En attente de ton partenaire...";
            }
        } else {
            elBetZone.classList.add('hidden');
        }

        // Phase de jeu de cartes
        if(state.phase === "playing") {
            if(state.turn === myRole) {
                elStatusText.innerText = "À TOI de jouer une carte !";
            } else {
                elStatusText.innerText = "C'est au tour de ton partenaire...";
            }
        }

        // Rendu du tapis central
        renderTableCenter();

        // Rendu de la main
        renderHand();

        // Fin de manche
        if(state.phase === "round_ended") {
            elBetZone.classList.add('hidden');
            elBtnNext.classList.remove('hidden');
        } else {
            elBtnNext.classList.add('hidden');
        }
    }

    function renderHand() {
        elHand.innerHTML = "";
        myHand.forEach(cardValue => {
            const cardEl = document.createElement('div');
            cardEl.className = "card";
            cardEl.innerText = cardValue;
            
            // Événement clic pour poser la carte
            cardEl.addEventListener('click', () => {
                if(state.phase !== "playing") return alert("Attends la fin des paris !");
                if(state.turn !== myRole) return alert("Ce n'est pas ton tour !");
                if(state.center[myRole]) return alert("Tu as déjà posé une carte pour ce pli !");

                // Poser la carte
                state.center[myRole] = cardValue;
                // Retirer de la main
                if(myRole === 'p1') window.p1Cards = window.p1Cards.filter(c => c !== cardValue);
                else window.p2Cards = window.p2Cards.filter(c => c !== cardValue);
                
                // Changer de tour ou résoudre le pli
                if(Object.keys(state.center).length === 2) {
                    resolveTrick();
                } else {
                    state.turn = (myRole === 'p1') ? 'p2' : 'p1';
                    updateLocalStorageState();
                    loadPlayerView();
                }
            });
            elHand.appendChild(cardEl);
        });
    }

    function renderTableCenter() {
        elTable.innerHTML = "";
        const playersPlayed = Object.keys(state.center);
        if(playersPlayed.length === 0) {
            elTable.innerHTML = `<div style="color: #999; font-style: italic;">Le tapis est vide. Jouez une carte !</div>`;
            return;
        }

        playersPlayed.forEach(player => {
            const cardEl = document.createElement('div');
            cardEl.className = "card played";
            cardEl.innerText = state.center[player];
            
            const label = document.createElement('div');
            label.className = "card-owner";
            label.innerText = player === 'p1' ? "Joueur 1" : "Joueur 2";
            cardEl.appendChild(label);
            
            elTable.appendChild(cardEl);
        });
    }

    // Gestion du clic pour soumettre le Guess
    document.getElementById('btn-submit-bet').addEventListener('click', () => {
        const betVal = parseInt(document.getElementById('bet-value').value);
        state.bets[myRole] = betVal;

        // Si les deux ont parié, on commence la phase de plis
        if(state.bets.p1 !== null && state.bets.p2 !== null) {
            state.phase = "playing";
        }
        updateLocalStorageState();
        loadPlayerView();
    });

    // Évaluation du gagnant du pli selon la règle piochée
    function resolveTrick() {
        const c1 = state.center.p1;
        const c2 = state.center.p2;
        let winner = "p1";

        switch(state.rule.id) {
            case 1: // Classique (Plus grande)
                winner = (c1 > c2) ? "p1" : "p2";
                break;
            case 2: // Inversion (Plus petite)
                winner = (c1 < c2) ? "p1" : "p2";
                break;
            case 3: // Zéro Absolu (Pair bat impair)
                if(c1 % 2 === 0 && c2 % 2 !== 0) winner = "p1";
                else if(c2 % 2 === 0 && c1 % 2 !== 0) winner = "p2";
                else winner = (c1 > c2) ? "p1" : "p2"; // Égalité de type, plus forte gagne
                break;
            case 4: // Piment Magique (Finit par 5)
                if(c1 % 10 === 5 && c2 % 10 !== 5) winner = "p1";
                else if(c2 % 10 === 5 && c1 % 10 !== 5) winner = "p2";
                else winner = (c1 > c2) ? "p1" : "p2";
                break;
            case 5: // Proche de 28
                winner = (Math.abs(c1 - 28) < Math.abs(c2 - 28)) ? "p1" : "p2";
                break;
        }

        state.tricksWon[winner]++;
        alert(`Le pli est remporté par le ${winner === 'p1' ? 'Joueur 1' : 'Joueur 2'} !`);
        
        // Vider le tapis
        state.center = {};
        // Le gagnant du pli commence le pli suivant
        state.turn = winner;

        // Est-ce que la manche est finie ? (Plus de cartes en main)
        const currentHand = (myRole === 'p1') ? window.p1Cards : window.p2Cards;
        if(currentHand.length === 0) {
            resolveRoundEnd();
        } else {
            updateLocalStorageState();
            loadPlayerView();
        }
    }

    // Fin de la manche complète : Attribution des piments (Malus)
    function resolveRoundEnd() {
        state.phase = "round_ended";
        
        // Vérification des devinettes (Guesses)
        let report = "Fin de la manche !\n";
        
        if(state.tricksWon.p1 !== state.bets.p1) {
            state.scores.p1++; // Reçoit un piment malus
            report += "❌ Joueur 1 s'est trompé ! Il prend 1 piment 🌶️\n";
        } else {
            report += "🎯 Joueur 1 a vu juste ! Aucun piment.\n";
        }

        if(state.tricksWon.p2 !== state.bets.p2) {
            state.scores.p2++; // Reçoit un piment malus
            report += "❌ Joueur 2 s'est trompé ! Il prend 1 piment 🌶️\n";
        } else {
            report += "🎯 Joueur 2 a vu juste ! Aucun piment.\n";
        }

        alert(report);
        updateLocalStorageState();
        loadPlayerView();
    }

    elBtnNext.addEventListener('click', () => {
        startNewRound();
    });

    // --- LOGIQUE DE SIMULATION INTER-ONGLETS / APPAREILS ---
    // Pour que vous puissiez y jouer immédiatement sur le même PC ou deux onglets :
    function updateLocalStorageState() {
        localStorage.setItem('pili_pili_state', JSON.stringify(state));
        localStorage.setItem('p1_cards', JSON.stringify(window.p1Cards));
        localStorage.setItem('p2_cards', JSON.stringify(window.p2Cards));
    }

    function simulateP2Joining() {
        state = JSON.parse(localStorage.getItem('pili_pili_state')) || state;
        window.p1Cards = JSON.parse(localStorage.getItem('p1_cards')) || [];
        window.p2Cards = JSON.parse(localStorage.getItem('p2_cards')) || [];
        loadPlayerView();
    }

    // Écouteur automatique pour synchroniser deux onglets ouverts en même temps sur la machine !
    window.addEventListener('storage', () => {
        state = JSON.parse(localStorage.getItem('pili_pili_state'));
        window.p1Cards = JSON.parse(localStorage.getItem('p1_cards'));
        window.p2Cards = JSON.parse(localStorage.getItem('p2_cards'));
        loadPlayerView();
    });

</script>
</body>
</html>
